name: Build Flex Yemen APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          
      - name: Reconstruct Project Correctly
        run: |
          # 1. نقل ملفاتنا الحالية لمكان مؤقت
          mkdir temp_lib
          cp -r lib/* temp_lib/
          cp pubspec.yaml temp_pubspec.yaml
          
          # 2. مسح كل شيء وإنشاء مشروع فلاتر رسمي متكامل في السيرفر
          rm -rf *
          flutter create . --org com.flexyemen.app --project-name flex_yemen
          
          # 3. إعادة ملفاتنا البرمجية للمشروع الجديد
          rm -rf lib/*
          cp -r temp_lib/* lib/
          cp temp_pubspec.yaml pubspec.yaml
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Build APK
        run: flutter build apk --release
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flex-yemen-apk
          path: build/app/outputs/flutter-apk/app-release.apk
