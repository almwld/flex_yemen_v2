name: Build Flex Yemen APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          
      - name: Reconstruct Project Safely
        run: |
          # 1. الاحتفاظ بنسخة من ملفاتنا في مكان آمن خارج المجلد الحالي
          mkdir -p ../safe_backup/lib
          cp -r lib/* ../safe_backup/lib/
          cp pubspec.yaml ../safe_backup/
          
          # 2. مسح المجلد الحالي لبناء هيكل نظيف
          rm -rf ./* ./.??*
          
          # 3. إنشاء المشروع الرسمي
          flutter create . --org com.flexyemen.app --project-name flex_yemen
          
          # 4. استعادة كود المنصة الخاص بنا
          rm -rf lib/*
          cp -r ../safe_backup/lib/* lib/
          cp ../safe_backup/pubspec.yaml pubspec.yaml
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Build APK
        run: flutter build apk --release
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flex-yemen-apk
          path: build/app/outputs/flutter-apk/app-release.apk
